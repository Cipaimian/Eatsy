name: Security Routine (Weekly)

on:
  schedule:
    # Monday 02:00 WIB (UTC+7) = Sunday 19:00 UTC
    - cron: '0 19 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  weekly-npm-audit:
    name: Weekly npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - name: npm audit (high)
        run: npm audit --audit-level=high

  weekly-trivy-image-scan:
    name: Weekly Trivy image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t eatsy:routine .
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: eatsy:routine
          format: sarif
          output: trivy-routine.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-routine.sarif
          category: trivy-routine

  weekly-gitleaks:
    name: Weekly Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
