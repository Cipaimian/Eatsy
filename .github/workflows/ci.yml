name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Smoke check (app boots)
        run: npm run smoke

  sca-npm-audit:
    name: SCA - npm audit
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Run npm audit (fail on high)
        run: npm audit --audit-level=high

  secret-scan-gitleaks:
    name: Secret Scan - Gitleaks
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  container-scan-trivy:
    name: Container Scan - Trivy
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t eatsy:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: eatsy:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  decision-gate:
    name: Decision Gate
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - sca-npm-audit
      - secret-scan-gitleaks
      - container-scan-trivy
    steps:
      - name: All security gates passed
        run: echo "All security and quality gates passed. Proceeding to deploy."

  deploy-staging:
    name: Deploy - Staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: decision-gate
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: |
          echo "Deploying ${GITHUB_SHA} to STAGING environment..."
          # TODO: replace with real deploy command (e.g. kubectl/docker push/ssh)

  deploy-production:
    name: Deploy - Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: decision-gate
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: |
          echo "Deploying ${GITHUB_SHA} to PRODUCTION environment..."
          # TODO: replace with real deploy command

  notify:
    name: Email Notification
    if: always()
    needs:
      - build-and-test
      - sca-npm-audit
      - secret-scan-gitleaks
      - container-scan-trivy
      - decision-gate
    runs-on: ubuntu-latest
    steps:
      - name: Check SMTP configured
        id: smtp
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        run: |
          if [ -n "$SMTP_SERVER" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SMTP_SERVER secret not set; skipping email notification."
          fi

      - name: Send email
        if: steps.smtp.outputs.configured == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[Eatsy CI] ${{ github.workflow }} on ${{ github.ref_name }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: Eatsy CI <${{ secrets.SMTP_USERNAME }}>
          body: |
            Workflow: ${{ github.workflow }}
            Repo:     ${{ github.repository }}
            Branch:   ${{ github.ref_name }}
            Commit:   ${{ github.sha }}
            Actor:    ${{ github.actor }}
            Run URL:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
