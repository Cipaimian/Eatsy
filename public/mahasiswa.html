<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eatsy - Mahasiswa</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>🎓 Eatsy - Mahasiswa</h1>
    <nav>
      <a href="/">Home</a>
      <a href="/mahasiswa.html" class="active">Mahasiswa</a>
      <a href="/tenant.html">Tenant</a>
    </nav>
  </header>

  <main>
    <section>
      <label>NIM / Student ID:
        <input id="studentId" value="stu1" />
      </label>
    </section>

    <section>
      <h2>1. Pilih Tenant</h2>
      <div id="tenants" class="grid"></div>
    </section>

    <section id="menuSection" hidden>
      <h2>2. Pilih Menu - <span id="tenantName"></span></h2>
      <div id="menus" class="grid"></div>
    </section>

    <section id="cartSection" hidden>
      <h2>3. Keranjang</h2>
      <ul id="cart"></ul>
      <p><strong>Total: Rp <span id="total">0</span></strong></p>
      <button id="checkoutBtn">Checkout & Bayar (QRIS)</button>
      <button class="secondary" id="clearCartBtn">Kosongkan</button>
    </section>
  </main>

  <footer>Eatsy &copy; Kelompok III</footer>
  <script src="/js/shared.js"></script>
  <script src="/js/mahasiswa.js"></script>
</body>
</html>
